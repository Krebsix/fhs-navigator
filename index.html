        function setLanguage(lang) {
            currentLang = lang;
            document.getElementById('search-input').placeholder = uiTexts[lang].searchPlaceholder;
            document.getElementById('search-btn').innerText = uiTexts[lang].searchBtn;
            
            // Fix back button content rendering with SVG
            document.getElementById('back-button').innerHTML = `<svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"></path></svg>${uiTexts[lang].backBtn}`;
            
            document.getElementById('btn-de').className = lang === 'de' ? 'px-5 py-2 rounded-full text-xs font-bold border-2 bg-green-600 text-white border-green-600' : 'px-5 py-2 rounded-full text-xs font-bold border-2 border-gray-200 text-gray-500 hover:border-gray-300';
            document.getElementById('btn-en').className = lang === 'en' ? 'px-5 py-2 rounded-full text-xs font-bold border-2 bg-green-600 text-white border-green-600' : 'px-5 py-2 rounded-full text-xs font-bold border-2 border-gray-200 text-gray-500 hover:border-gray-300';
            
            // Re-render if in category view
            if (!document.getElementById('category-view').classList.contains('hidden')) {
                const currentCatId = document.getElementById('category-title').getAttribute('data-id');
                if(currentCatId) showCategory(currentCatId);
            } else {
                renderMainGrid();
            }
        }

        function renderMainGrid() {
            const grid = document.getElementById('category-grid');
            grid.innerHTML = '';
            for (const [id, content] of Object.entries(data)) {
                grid.innerHTML += `
                    <div onclick="showCategory('${id}')" class="category-card p-8 text-white relative overflow-hidden flex flex-col justify-between min-h-[220px]" style="background-color: ${content.color}">
                        <div>
                            <div class="text-5xl mb-4 opacity-90">${content.icon}</div>
                            <h3 class="text-2xl font-black leading-tight mb-2">${id} — ${content[currentLang].title}</h3>
                            <p class="text-sm font-medium opacity-90">${content[currentLang].desc}</p>
                        </div>
                        <div class="mt-6 flex justify-end">
                            <div class="bg-white/20 rounded-full p-2 backdrop-blur-sm">
                                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"></path></svg>
                            </div>
                        </div>
                    </div>`;
            }
        }

        function showCategory(id) {
            const cat = data[id];
            
            const headerStyle = document.getElementById('category-header-style');
            headerStyle.style.borderColor = cat.color;
            
            const titleEl = document.getElementById('category-title');
            titleEl.innerText = `${id} — ${cat[currentLang].title}`;
            titleEl.setAttribute('data-id', id);
            
            document.getElementById('category-desc').innerText = cat[currentLang].desc;
            
            const container = document.getElementById('sub-categories-container');
            container.innerHTML = '';
            
            cat.subs.forEach(sub => {
                const subSection = document.createElement('div');
                subSection.className = "mb-12";
                subSection.innerHTML = `
                    <div class="flex items-center mb-6">
                        <div class="h-px bg-gray-200 flex-1"></div>
                        <h3 class="px-4 text-xs font-black text-gray-400 uppercase tracking-widest">${sub[currentLang]}</h3>
                        <div class="h-px bg-gray-200 flex-1"></div>
                    </div>
                `;
                
                const grid = document.createElement('div');
                grid.className = "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5";
                
                sub.items.forEach(item => {
                    grid.innerHTML += `
                        <a href="${item.l}" target="_blank" class="tool-card p-6 bg-white group border-gray-100 relative overflow-hidden">
                            <div class="absolute top-0 left-0 w-1 h-full" style="background-color: ${cat.color}"></div>
                            <div>
                                <div class="mb-3">
                                    <span class="badge inline-block mb-3" style="background-color: ${cat.color}15; color: ${cat.color}">${item.b}</span>
                                    <h4 class="font-bold text-lg leading-snug group-hover:text-green-600 transition-colors">${item.t}</h4>
                                </div>
                                <p class="text-gray-500 text-sm font-medium leading-relaxed">${item.d[currentLang]}</p>
                            </div>
                            <div class="mt-6 flex items-center text-xs font-black text-gray-400 group-hover:text-green-600 transition-all transform group-hover:translate-x-1">
                                ${currentLang === 'de' ? 'RESSOURCE ÖFFNEN' : 'OPEN RESOURCE'} <svg class="ml-1 w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7-7 7"></path></svg>
                            </div>
                        </a>`;
                });
                subSection.appendChild(grid);
                container.appendChild(subSection);
            });
            
            document.getElementById('main-view').classList.add('hidden');
            document.getElementById('search-section').classList.add('hidden');
            document.getElementById('category-view').classList.remove('hidden');
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function goBack() {
            document.getElementById('category-view').classList.add('hidden');
            document.getElementById('main-view').classList.remove('hidden');
            document.getElementById('search-section').classList.remove('hidden');
        }

        setLanguage('de');
    </script>
</body>
</html>
