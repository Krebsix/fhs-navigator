<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FHS Resource Hub — Term 4</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root { --font-display:'Syne',sans-serif; --font-body:'Nunito',sans-serif; }
  * { font-family:var(--font-body); scroll-behavior: smooth; }
  .font-display { font-family:var(--font-display); }
  body { background:#F7F5F0; color: #1a1a1a; }
  
  /* Cards & Animations */
  .cat-card { transition: transform .2s cubic-bezier(.34,1.56,.64,1), box-shadow .2s ease; border-radius: 2rem; }
  .cat-card:hover { transform: translateY(-5px) scale(1.02); box-shadow: 0 20px 40px rgba(0,0,0,0.08); }
  
  .tool-card { 
    transition: all .2s ease; 
    border-radius: 1.5rem; 
    height: 100%; 
    display: flex; 
    flex-direction: column; 
    border: 1px solid rgba(0,0,0,0.05);
  }
  .tool-card:hover { 
    transform: translateY(-3px); 
    box-shadow: 0 12px 30px rgba(0,0,0,0.08); 
    border-color: rgba(99,102,241,0.2);
  }

  .view { animation: fadeSlide .3s ease-out both; }
  @keyframes fadeSlide { 
    from { opacity:0; transform:translateY(15px); } 
    to { opacity:1; transform:translateY(0); } 
  }

  .sec-title::after { 
    content:''; display:block; width:40px; height:4px; 
    border-radius:2px; margin-top:8px; background:currentColor; opacity:.3; 
  }

  /* Custom Scrollbar */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: #f1f1f1; }
  ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: #999; }

  /* Search Highlight */
  mark { background: #fef08a; padding: 0 2px; border-radius: 2px; }
</style>
</head>
<body class="min-h-screen pb-12">

<header class="sticky top-0 z-50 bg-white/80 backdrop-blur-xl border-b border-gray-100 shadow-sm">

    <div class="flex items-center gap-4 cursor-pointer" onclick="showHome()">

      <div>
        <div class="font-display font-extrabold text-gray-900 text-base leading-tight">Future Human School</div>
        <div class="text-[10px] uppercase tracking-widest text-gray-400 font-bold">Resource Hub · Term 4 · Bali</div>
      </div>
    </div>

    <div class="flex items-center gap-3">
      <div class="relative hidden md:block">
        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none text-sm">🔍</span>
        <input id="search-input" type="search" placeholder="Search resources..."
          class="pl-10 pr-4 py-2.5 rounded-2xl bg-gray-100/50 text-sm w-64 border border-transparent focus:bg-white focus:border-indigo-300 focus:ring-4 focus:ring-indigo-50/50 transition-all outline-none"
          oninput="handleSearch(this.value)">
      </div>
      <button id="lang-toggle" onclick="toggleLang()"
        class="px-4 py-2.5 rounded-2xl bg-gray-900 text-white text-xs font-black tracking-widest hover:bg-indigo-600 transition-all shadow-md active:scale-95">DE</button>
    </div>
  </div>
</header>

<main class="max-w-6xl mx-auto px-4 py-8">

  <div id="view-home" class="view">
    <div class="mb-10 text-center md:text-left">
      <h1 id="home-title" class="font-display text-4xl md:text-5xl font-black text-gray-900 mb-3 tracking-tight"></h1>
      <p id="home-sub" class="text-gray-500 text-lg max-w-2xl"></p>
    </div>
    
    <div id="category-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>

    <div id="search-results" class="hidden mt-12">
      <div class="flex items-center justify-between mb-6 border-b pb-4">
        <h2 id="search-title" class="font-display text-2xl font-bold text-gray-800"></h2>
        <button onclick="clearSearch()" class="text-sm font-bold text-indigo-600 hover:underline">Clear</button>
      </div>
      <div id="search-list" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>
  </div>

  <div id="view-category" class="view hidden">
    <button class="group flex items-center gap-2 text-sm font-black text-gray-400 hover:text-gray-900 mb-8 transition-all" onclick="showHome()">
      <div class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center group-hover:bg-gray-200 transition-colors">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </div>
      <span id="back-label" class="uppercase tracking-widest">Back</span>
    </button>

    <div id="cat-header" class="rounded-[2.5rem] p-8 md:p-12 mb-12 text-white shadow-2xl relative overflow-hidden">
      <div class="relative z-10 flex flex-col md:flex-row md:items-center gap-8">
        <div id="cat-icon" class="text-7xl md:text-8xl leading-none drop-shadow-lg"></div>
        <div>
          <div id="cat-title" class="font-display text-4xl md:text-5xl font-black tracking-tight mb-3"></div>
          <p id="cat-subtitle" class="text-white/90 text-lg md:text-xl max-w-3xl leading-relaxed font-medium"></p>
        </div>
      </div>
    </div>

    <div id="cat-sections" class="space-y-16"></div>
  </div>

</main>

<footer class="mt-20 border-t border-gray-200 py-12 text-center px-4">
  <p class="text-sm font-bold text-gray-400 uppercase tracking-widest">Future Human School Bali · Term 4 · 2026</p>
  <p class="text-gray-400 mt-2 italic">"Nature has been solving design problems for 3.8 billion years."</p>
</footer>

let currentLang = 'en';

function init() {
  renderUI();
  renderGrid();
}

function toggleLang() {
  currentLang = currentLang === 'en' ? 'de' : 'en';
  document.getElementById('lang-toggle').innerText = currentLang === 'en' ? 'DE' : 'EN';
  renderUI();
  // Refresh current view
  if (!document.getElementById('view-category').classList.contains('hidden')) {
    showCategory(document.getElementById('cat-title').dataset.id);
  } else {
    renderGrid();
  }
}

function renderUI() {
  const t = {
    en: { title: 'Explore Resources', sub: 'Nature has the answers. We have the links. Dive into Term 4.', back: 'Back to Categories', search: 'Search results for' },
    de: { title: 'Ressourcen entdecken', sub: 'Die Natur hat die Antworten. Wir die Links. Starte in Term 4.', back: 'Zurück zur Übersicht', search: 'Suchergebnisse für' }
  };
  document.getElementById('home-title').innerText = t[currentLang].title;
  document.getElementById('home-sub').innerText = t[currentLang].sub;
  document.getElementById('back-label').innerText = t[currentLang].back;
  document.getElementById('search-title').dataset.template = t[currentLang].search;
}

function renderGrid() {
  const grid = document.getElementById('category-grid');
  grid.innerHTML = CATS.map(cat => `
    <div onclick="showCategory('${cat.id}')" class="cat-card cursor-pointer bg-white p-8 border border-gray-100 flex flex-col items-center text-center group">
      <div class="w-20 h-20 rounded-[2rem] mb-6 flex items-center justify-center text-4xl shadow-lg transition-transform group-hover:scale-110" style="background: ${cat.gradient}">${cat.icon}</div>
      <h3 class="font-display font-black text-xl text-gray-900 mb-2">${cat[currentLang].title}</h3>
      <p class="text-sm text-gray-400 font-medium leading-relaxed">${cat[currentLang].subtitle}</p>
    </div>
  `).join('');
  document.getElementById('search-results').classList.add('hidden');
  grid.classList.remove('hidden');
}

function showCategory(id) {
  const cat = CATS.find(c => c.id === id);
  window.scrollTo(0, 0);
  document.getElementById('view-home').classList.add('hidden');
  document.getElementById('view-category').classList.remove('hidden');
  
  document.getElementById('cat-header').style.background = cat.gradient;
  document.getElementById('cat-icon').innerText = cat.icon;
  document.getElementById('cat-title').innerText = cat[currentLang].title;
  document.getElementById('cat-title').dataset.id = id;
  document.getElementById('cat-subtitle').innerText = cat[currentLang].subtitle;
  
  document.getElementById('cat-sections').innerHTML = cat.sections.map(sec => `
    <div>
      <h3 class="sec-title font-display text-base font-black uppercase tracking-[0.2em] mb-8" style="color:${cat.accent}">${sec[currentLang]}</h3>
      <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6">
        ${sec.tools.map(tool => `
          <a href="${tool.url}" target="_blank" rel="noopener noreferrer" class="tool-card bg-white p-6 group">
            <div class="flex justify-between items-start mb-4">
              <span class="text-3xl filter drop-shadow-sm">${tool.icon}</span>
              <span class="text-[10px] font-black px-2.5 py-1 bg-gray-100 text-gray-500 rounded-lg uppercase tracking-wider">${tool.src}</span>
            </div>
            <h4 class="font-bold text-gray-900 text-base mb-2 group-hover:text-indigo-600 transition-colors">${tool[currentLang].name}</h4>
            <p class="text-sm text-gray-500 leading-relaxed mb-6">${tool[currentLang].desc}</p>
            <div class="mt-auto pt-4 flex items-center justify-between border-t border-gray-50">
              <span class="text-[10px] font-extrabold text-gray-300 uppercase tracking-widest">${tool.badge}</span>
              <span class="text-xs font-black uppercase tracking-widest flex items-center gap-1" style="color:${cat.accent}">
                Open <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M7 17L17 7M17 7H7M17 7V17"/></svg>
              </span>
            </div>
          </a>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function showHome() {
  document.getElementById('view-home').classList.remove('hidden');
  document.getElementById('view-category').classList.add('hidden');
  window.scrollTo(0, 0);
}

function handleSearch(val) {
  const q = val.toLowerCase().trim();
  const grid = document.getElementById('category-grid');
  const resultsArea = document.getElementById('search-results');
  const searchList = document.getElementById('search-list');
  const searchTitle = document.getElementById('search-title');

  if (q.length < 2) {
    grid.classList.remove('hidden');
    resultsArea.classList.add('hidden');
    return;
  }

  const matches = [];
  CATS.forEach(cat => {
    cat.sections.forEach(sec => {
      sec.tools.forEach(tool => {
        if (tool[currentLang].name.toLowerCase().includes(q) || 
            tool[currentLang].desc.toLowerCase().includes(q) ||
            cat[currentLang].title.toLowerCase().includes(q)) {
          matches.push({ tool, catAccent: cat.accent });
        }
      });
    });
  });

  grid.classList.add('hidden');
  resultsArea.classList.remove('hidden');
  searchTitle.innerText = `${searchTitle.dataset.template} "${val}"`;

  searchList.innerHTML = matches.map(m => `
    <a href="${m.tool.url}" target="_blank" class="tool-card bg-white p-6 border-l-4" style="border-left-color: ${m.catAccent}">
      <div class="flex items-center gap-3 mb-2">
        <span class="text-xl">${m.tool.icon}</span>
        <h4 class="font-bold text-gray-900">${m.tool[currentLang].name}</h4>
      </div>
      <p class="text-xs text-gray-500 line-clamp-2">${m.tool[currentLang].desc}</p>
    </a>
  `).join('');

  if (matches.length === 0) {
    searchList.innerHTML = `<p class="col-span-full text-center py-12 text-gray-400 font-medium italic">No resources found for "${val}"...</p>`;
  }
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  handleSearch('');
}

// Start
init();
</script>
</body>
</html>
