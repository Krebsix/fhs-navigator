<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FHS Learning Resources</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .category-card { transition: transform 0.2s; cursor: pointer; border-radius: 2rem; }
        .category-card:hover { transform: scale(1.02); }
        .tool-card { transition: all 0.2s; border-radius: 1.25rem; border: 1px solid #e5e7eb; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }
        .tool-card:hover { border-color: #10b981; background-color: #f8fafc; transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .hidden { display: none; }
        .badge { font-size: 0.65rem; padding: 4px 10px; border-radius: 9999px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900">

    <header class="p-6 max-w-6xl mx-auto flex justify-between items-center bg-white rounded-b-3xl shadow-sm mb-8">
        <div>
            <h1 class="text-3xl font-black tracking-tight uppercase text-green-600">Future Human School</h1>
            <p id="header-subtitle" class="text-sm text-gray-500 font-bold mt-1">Learning Resources • Term 4 • 2026</p>
        </div>
        <div class="flex gap-2">
            <button onclick="setLanguage('de')" id="btn-de" class="px-5 py-2 rounded-full text-xs font-bold border-2 transition-all">DE</button>
            <button onclick="setLanguage('en')" id="btn-en" class="px-5 py-2 rounded-full text-xs font-bold border-2 transition-all">EN</button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-6">
        
        <section id="search-section" class="mb-12">
            <div class="flex gap-3">
                <input type="text" id="search-input" placeholder="Was möchtest du lernen?" class="flex-1 p-5 rounded-2xl bg-white border border-gray-200 focus:ring-2 focus:ring-green-500 outline-none font-medium text-lg shadow-sm">
                <button onclick="performSearch()" id="search-btn" class="bg-green-600 text-white px-8 rounded-2xl shadow-md font-bold hover:bg-green-700 transition-colors uppercase tracking-widest text-sm">Suchen</button>
            </div>
        </section>

        <section id="main-view">
            <div id="category-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>

        <section id="detail-view" class="hidden">
            <button onclick="goBack()" id="back-button" class="mb-8 flex items-center text-gray-500 font-black hover:text-black transition-colors uppercase text-sm tracking-widest bg-white py-2 px-4 rounded-full shadow-sm border border-gray-200">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"></path></svg>
                <span id="back-text">Zurück zur Übersicht</span>
            </button>
            
            <div class="bg-white p-8 rounded-3xl shadow-sm mb-10 border-l-8" id="view-header-style">
                <h2 id="view-title" class="text-4xl font-black tracking-tight mb-2"></h2>
                <p id="view-desc" class="text-gray-500 font-medium text-lg"></p>
            </div>
            
            <div id="results-container"></div>
        </section>
    </main>

    <script>
        let currentLang = 'de';
        const data = {
            "01": { color: "#f59e0b", icon: "🧮", de: { title: "Maths & Reading", desc: "Grundlagen & Übung" }, en: { title: "Maths & Reading", desc: "Tools & Practice" },
                subs: [
                    { de: "Mathe - Tools", en: "Maths Tools", items: [
                        { t: "Seneca Learning", d: { de: "Adaptive Mathe-Wiederholung für 11-16 Jährige.", en: "Adaptive maths revision for 11-16." }, l: "https://senecalearning.com", b: "11-16 · free" },
                        { t: "Khan Academy", d: { de: "Videos und Übungen für jedes Niveau.", en: "Self-paced videos and practice." }, l: "https://www.khanacademy.org/math", b: "All ages · free" },
                        { t: "White Rose Maths", d: { de: "Strukturierte Arbeitspläne und Videos.", en: "Structured schemes and videos." }, l: "https://whiteroseeducation.com", b: "All ages · free" },
                        { t: "School.ai", d: { de: "KI-gestützte personalisierte Nachhilfe.", en: "AI-powered personalised tutoring." }, l: "https://schoolai.com", b: "9-16 · login" }
                    ]},
                    { de: "Lesen & Schreiben", en: "Reading & Writing", items: [
                        { t: "Pobble", d: { de: "Community für kreatives Schreiben.", en: "Creative writing community." }, l: "https://www.pobble.com/", b: "9-16 · free" },
                        { t: "The Reading Realm", d: { de: "Ressourcen zum Leseverständnis.", en: "Reading resources for 9-16." }, l: "https://thereadingrealm.co.uk", b: "9-16 · free" }
                    ]}
                ]
            },
            "02": { color: "#10b981", icon: "🌿", de: { title: "Biomimicry & Design", desc: "Von der Natur lernen" }, en: { title: "Biomimicry & Design", desc: "Nature-inspired design" },
                subs: [
                    { de: "Biomimicry", en: "Biomimicry", items: [
                        { t: "AskNature.org", d: { de: "Lösungen der Natur suchen.", en: "Search nature's solutions." }, l: "https://asknature.org", b: "All ages" },
                        { t: "Spider Silk (TED)", d: { de: "Die Magie der Spinnenseide.", en: "Magnificence of spider silk." }, l: "https://www.ted.com/talks/cheryl_hayashi_the_magnificence_of_spider_silk", b: "8 min" },
                        { t: "Biomimicry in Action", d: { de: "Janine Benyus über Design.", en: "Janine Benyus on nature's design." }, l: "https://www.ted.com/talks/janine_benyus_biomimicry_in_action", b: "11+" }
                    ]},
                    { de: "Design Thinking", en: "Design Thinking", items: [
                        { t: "Stanford Process", d: { de: "In 5 Schritten zum Prototyp.", en: "5 steps to prototype." }, l: "https://ed.ted.com/on/o57WihZH", b: "11+" },
                        { t: "Pixar in a Box", d: { de: "Design durch Storytelling.", en: "Design through storytelling." }, l: "https://www.khanacademy.org/computing/pixar", b: "9+" },
                        { t: "Critical Thinking", d: { de: "5 Tipps für besseres Denken.", en: "5 tips by Samantha Agoos." }, l: "https://ed.ted.com/lessons/5-tips-to-improve-your-critical-thinking-samantha-agoos", b: "All ages" }
                    ]}
                ]
            },
            "03": { color: "#14b8a6", icon: "🌍", de: { title: "Sustainability", desc: "Zukunft gestalten" }, en: { title: "Sustainability", desc: "SDGs & Climate" },
                subs: [
                    { de: "SDGs & Klima", en: "SDGs & Climate", items: [
                        { t: "Earth School", d: { de: "30 Lektionen zum Klimaschutz.", en: "30-lesson climate programme." }, l: "https://ed.ted.com/earth-school", b: "Certificate" },
                        { t: "Circular Economy", d: { de: "Fortschritt neu denken.", en: "Re-thinking progress." }, l: "https://ed.ted.com/best_of_web/2Yy019iv", b: "11+" }
                    ]},
                    { de: "Bali & Lokal", en: "Bali & Local", items: [
                        { t: "Kembali Ke Hutan", d: { de: "Indonesischer Kurs zum Wald.", en: "Indonesian forest course." }, l: "https://youthtopia.education/courses/kembali-ke-hutan", b: "Bahasa/EN" },
                        { t: "Ocean Plastic", d: { de: "Plastikverschmutzung stoppen.", en: "Ocean plastic masterclass." }, l: "https://youthtopia.education/courses/ocean-plastic-pollution", b: "Bali context" }
                    ]}
                ]
            },
            "04": { color: "#3b82f6", icon: "⚛️", de: { title: "Physics & Maths", desc: "Wissenschaft & Technik" }, en: { title: "Physics & Maths", desc: "Science & Engineering" },
                subs: [
                    { de: "Physik & Code", en: "Physics & Code", items: [
                        { t: "Middle School Physics", d: { de: "Kräfte und Energie verstehen.", en: "Forces, energy, waves." }, l: "https://www.khanacademy.org/science/ms-physics", b: "9-13" },
                        { t: "Harvard CS50", d: { de: "Einführung Informatik.", en: "Intro to computer science." }, l: "https://pll.harvard.edu/course/cs50-introduction-computer-science", b: "13+ · free" }
                    ]}
                ]
            },
            "05": { color: "#8b5cf6", icon: "🎤", de: { title: "Storytelling", desc: "Präsentieren lernen" }, en: { title: "Storytelling", desc: "Presenting ideas" },
                subs: [
                    { de: "Public Speaking", en: "Public Speaking", items: [
                        { t: "Public Speaking 101", d: { de: "Eigene Ideen präsentieren.", en: "Finding your idea & talk." }, l: "https://ed.ted.com/ted_ed_collections/public-speaking-101", b: "11-episode" },
                        { t: "Chris Anderson (TED)", d: { de: "Meisterhaftes Präsentieren.", en: "Mastering public speaking." }, l: "https://ed.ted.com/lessons/we-can-help-you-master-public-speaking-chris-anderson", b: "All ages" }
                    ]}
                ]
            },
            "06": { color: "#0ea5e9", icon: "🚀", de: { title: "PEP Support", desc: "Dein Projekt-Support" }, en: { title: "PEP Support", desc: "Project Exploration" },
                subs: [
                    { de: "Prozess & Mindset", en: "Process & Mindset", items: [
                        { t: "Social Shifters", d: { de: "Impact-Projekte aufbauen.", en: "Building impact projects." }, l: "https://www.youthtopia.education/courses/socialshifters", b: "All ages" },
                        { t: "Keep Going", d: { de: "Dranbleiben, wenn es hakt.", en: "How to keep going." }, l: "https://www.youthtopia.education/courses/gaining-momentum-and-how-to-keep-going-with-sophia", b: "Support" }
                    ]},
                    { de: "Kurse & Zertifikate", en: "Courses & Certificates", items: [
                        { t: "Harvard Free Courses", d: { de: "Über 100 kostenlose Kurse.", en: "100+ free courses catalog." }, l: "https://pll.harvard.edu/catalog/free", b: "13+" },
                        { t: "Bali Ocean Courses", d: { de: "CTC Meeresökologie-Kurse.", en: "Coral Triangle Center courses." }, l: "https://bit.ly/cdsonlinectc", b: "Paid/Cert" }
                    ]}
                ]
            }
        };

        function setLanguage(lang) {
            currentLang = lang;
            document.getElementById('search-input').placeholder = lang === 'de' ? "Was möchtest du lernen?" : "What do you want to learn?";
            document.getElementById('search-btn').innerText = lang === 'de' ? "Suchen" : "Search";
            document.getElementById('back-text').innerText = lang === 'de' ? "Zurück zur Übersicht" : "Back to Overview";
            
            document.getElementById('btn-de').className = lang === 'de' ? 'px-5 py-2 rounded-full text-xs font-bold border-2 bg-green-600 text-white border-green-600' : 'px-5 py-2 rounded-full text-xs font-bold border-2 border-gray-200 text-gray-500 hover:border-gray-300';
            document.getElementById('btn-en').className = lang === 'en' ? 'px-5 py-2 rounded-full text-xs font-bold border-2 bg-green-600 text-white border-green-600' : 'px-5 py-2 rounded-full text-xs font-bold border-2 border-gray-200 text-gray-500 hover:border-gray-300';
            
            renderMainGrid();
            goBack();
        }

        function renderMainGrid() {
            const grid = document.getElementById('category-grid');
            grid.innerHTML = '';
            for (const [id, content] of Object.entries(data)) {
                grid.innerHTML += `
                    <div onclick="showCategory('${id}')" class="category-card p-8 text-white relative overflow-hidden flex flex-col justify-between min-h-[220px]" style="background-color: ${content.color}">
                        <div><div class="text-5xl mb-4 opacity-90">${content.icon}</div>
                        <h3 class="text-2xl font-black leading-tight mb-2">${id} — ${content[currentLang].title}</h3>
                        <p class="text-sm font-medium opacity-90">${content[currentLang].desc}</p></div>
                        <div class="mt-6 flex justify-end"><div class="bg-white/20 rounded-full p-2 backdrop-blur-sm"><svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"></path></svg></div></div>
                    </div>`;
            }
        }

        function showCategory(id) {
            const cat = data[id];
            displayResults(`${id} — ${cat[currentLang].title}`, cat[currentLang].desc, cat.color, cat.subs);
        }

        function performSearch() {
            const query = document.getElementById('search-input').value.toLowerCase();
            if (!query) return;
            let results = [];
            for (const [id, cat] of Object.entries(data)) {
                cat.subs.forEach(sub => {
                    const filteredItems = sub.items.filter(i => 
                        i.t.toLowerCase().includes(query) || 
                        i.d[currentLang].toLowerCase().includes(query)
                    );
                    if (filteredItems.length > 0) {
                        results.push({ title: sub[currentLang], items: filteredItems });
                    }
                });
            }
            const title = currentLang === 'de' ? "Suchergebnisse" : "Search Results";
            const desc = currentLang === 'de' ? `Ergebnisse für: "${query}"` : `Results for: "${query}"`;
            displayResults(title, desc, "#10b981", results);
        }

        function displayResults(title, desc, color, sections) {
            document.getElementById('view-header-style').style.borderColor = color;
            document.getElementById('view-title').innerText = title;
            document.getElementById('view-desc').innerText = desc;
            
            const container = document.getElementById('results-container');
            container.innerHTML = '';
            
            sections.forEach(sec => {
                const subSection = document.createElement('div');
                subSection.className = "mb-12";
                subSection.innerHTML = `<div class="flex items-center mb-6"><div class="h-px bg-gray-200 flex-1"></div><h3 class="px-4 text-xs font-black text-gray-400 uppercase tracking-widest">${sec.de || sec.title}</h3><div class="h-px bg-gray-200 flex-1"></div></div>`;
                
                const grid = document.createElement('div');
                grid.className = "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5";
                sec.items.forEach(item => {
                    grid.innerHTML += `
                        <a href="${item.l}" target="_blank" class="tool-card p-6 bg-white group border-gray-100 relative overflow-hidden">
                            <div class="absolute top-0 left-0 w-1 h-full" style="background-color: ${color}"></div>
                            <div><span class="badge inline-block mb-3" style="background-color: ${color}15; color: ${color}">${item.b}</span>
                            <h4 class="font-bold text-lg leading-snug group-hover:text-green-600 transition-colors">${item.t}</h4>
                            <p class="text-gray-500 text-sm font-medium mt-2">${item.d[currentLang]}</p></div>
                            <div class="mt-6 flex items-center text-xs font-black text-gray-400 group-hover:text-green-600 transition-all transform group-hover:translate-x-1 uppercase">Link öffnen →</div>
                        </a>`;
                });
                subSection.appendChild(grid);
                container.appendChild(subSection);
            });
            
            document.getElementById('main-view').classList.add('hidden');
            document.getElementById('detail-view').classList.remove('hidden');
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function goBack() {
            document.getElementById('detail-view').classList.add('hidden');
            document.getElementById('main-view').classList.remove('hidden');
        }

        // Initial setup
        setLanguage('de');
    </script>
</body>
</html>
