<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FHS KI-Navigator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .category-card { transition: transform 0.2s; cursor: pointer; border-radius: 2rem; }
        .category-card:hover { transform: scale(1.02); }
        .tool-card { transition: all 0.2s; border-radius: 1.25rem; border: 1px solid #e5e7eb; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }
        .tool-card:hover { border-color: #3b82f6; background-color: #f8fafc; transform: translateY(-2px); }
        .hidden { display: none; }
        .badge { font-size: 0.6rem; padding: 2px 10px; border-radius: 9999px; font-weight: 800; text-transform: uppercase; }
    </style>
</head>
<body class="bg-white font-sans text-gray-900">

    <header class="p-6 max-w-5xl mx-auto flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-black tracking-tight">FHS KI-Navigator</h1>
            <p id="header-subtitle" class="text-sm text-gray-500 font-medium italic">Lern-Ressourcen Guide • Term 4</p>
        </div>
        <div class="flex gap-2">
            <button onclick="setLanguage('de')" id="btn-de" class="px-4 py-2 rounded-full text-xs font-bold border-2 transition-all">DE</button>
            <button onclick="setLanguage('en')" id="btn-en" class="px-4 py-2 rounded-full text-xs font-bold border-2 transition-all">EN</button>
        </div>
    </header>

    <main class="max-w-5xl mx-auto p-6">
        <section id="search-section" class="mb-12">
            <div class="flex gap-3">
                <input type="text" id="search-input" class="flex-1 p-5 rounded-2xl bg-gray-100 border-none focus:ring-2 focus:ring-blue-500 outline-none font-medium italic">
                <button id="search-btn" class="bg-gray-900 text-white px-8 rounded-2xl shadow-lg font-bold hover:bg-black transition-colors uppercase tracking-widest text-sm">Suchen</button>
            </div>
        </section>

        <section id="main-view">
            <h2 id="section-label" class="text-xs font-bold text-gray-400 uppercase tracking-[0.2em] mb-6">Hauptbereiche</h2>
            <div id="category-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>

        <section id="category-view" class="hidden">
            <button onclick="goBack()" id="back-button" class="mb-8 flex items-center text-gray-400 font-black hover:text-black transition-colors uppercase text-sm tracking-widest">← Zurück</button>
            <h2 id="category-title" class="text-4xl font-black mb-10 tracking-tight"></h2>
            <div id="sub-categories-container"></div>
        </section>
    </main>

    <script>
        let currentLang = 'de';

        const uiTexts = {
            de: { subtitle: "Lern-Ressourcen Guide • Term 4", searchPlaceholder: "Was möchtest du heute lernen?", searchBtn: "Suchen", sectionLabel: "Hauptbereiche", backBtn: "← Zurück zur Übersicht" },
            en: { subtitle: "Learning Resources Guide • Term 4", searchPlaceholder: "What do you want to learn today?", searchBtn: "Search", sectionLabel: "Main Categories", backBtn: "← Back to Overview" }
        };

        const data = {
            "01": {
                color: "#f9a01b", icon: "🧮",
                de: { title: "Grundlagen", desc: "Mathe & Sprache" },
                en: { title: "Foundations", desc: "Math & Language" },
                subs: [
                    { 
                        de: "Mathe Werkzeuge", en: "Math Tools",
                        items: [
                            { t: "Seneca Learning", d: { de: "Adaptives Training (11-16J)", en: "Adaptive Learning (11-16y)" }, l: "https://senecalearning.com", b: "9-16J" },
                            { t: "Khan Academy", d: { de: "Mathe-Kurse für alle Niveaus", en: "Math courses for all levels" }, l: "https://khanacademy.org/math", b: "Gratis" },
                            { t: "White Rose Maths", d: { de: "Strukturierte Mathe-Lektionen", en: "Structured math lessons" }, l: "https://whiteroseeducation.com", b: "9-16J" },
                            { t: "School.ai", d: { de: "KI-Mathetutor (Login Jak)", en: "AI Math Tutor" }, l: "https://school.ai", b: "AI" }
                        ]
                    },
                    { 
                        de: "Lesen & Schreiben", en: "Literacy",
                        items: [
                            { t: "Pobble", d: { de: "Kreatives Schreiben", en: "Creative Writing" }, l: "https://pobble.com", b: "Writing" },
                            { t: "CommonLit", d: { de: "Texte & Analyse", en: "Reading & Analysis" }, l: "https://commonlit.org", b: "Reading" },
                            { t: "The Reading Realm", d: { de: "Interaktive Lese-Ressourcen", en: "Interactive reading resources" }, l: "https://thereadingrealm.co.uk", b: "9-16J" }
                        ]
                    }
                ]
            },
            "02": {
                color: "#00b289", icon: "🌿",
                de: { title: "Biomimikry", desc: "Design Thinking" },
                en: { title: "Biomimicry", desc: "Design Thinking" },
                subs: [
                    { 
                        de: "Innovation & Natur", en: "Innovation & Nature",
                        items: [
                            { t: "AskNature.org", d: { de: "Biologische Strategien finden", en: "Find biological strategies" }, l: "https://asknature.org", b: "Research" },
                            { t: "TED-Ed Biomimicry", d: { de: "Inspirierende Video-Lektionen", en: "Inspiring video lessons" }, l: "https://ed.ted.com", b: "Video" },
                            { t: "Janine Benyus", d: { de: "Grundlagen der Biomimikry", en: "Foundations of Biomimicry" }, l: "https://biomimicry.org", b: "Masterclass" }
                        ]
                    },
                    { 
                        de: "Design Prozess", en: "Design Process",
                        items: [
                            { t: "Stanford d.school", d: { de: "Design Thinking Framework", en: "Design Thinking Framework" }, l: "https://dschool.stanford.edu", b: "Methods" },
                            { t: "Pixar in a Box", d: { de: "Storytelling & Design", en: "Storytelling & Design" }, l: "https://khanacademy.org/computing/pixar", b: "Pixar" }
                        ]
                    }
                ]
            },
            "03": {
                color: "#ef4444", icon: "🌍",
                de: { title: "Bali & Impact", desc: "Nachhaltigkeit & SDGs" },
                en: { title: "Bali & Impact", desc: "Sustainability & SDGs" },
                subs: [
                    { 
                        de: "Globaler Impact", en: "Global Impact",
                        items: [
                            { t: "Earth School", d: { de: "30-Tage Klimakurs", en: "30-day climate course" }, l: "https://ed.ted.com/earth-school", b: "Certificate" },
                            { t: "SDG Crash Course", d: { de: "Die 17 Ziele verstehen", en: "Understand the 17 goals" }, l: "https://youthtopia.education", b: "Free" }
                        ]
                    },
                    { 
                        de: "Bali Kontext", en: "Bali Context",
                        items: [
                            { t: "CTC Bali", d: { de: "Korallen- & Meeresökologie", en: "Coral & Marine Ecology" }, l: "https://bit.ly/cdsonlinectc", b: "Local" },
                            { t: "Kembali Ke Hutan", d: { de: "Indonesische Wälder (Bahasa)", en: "Indonesian Forests" }, l: "https://youthtopia.education", b: "Forest" }
                        ]
                    }
                ]
            },
            "04": {
                color: "#3b82f6", icon: "🐢",
                de: { title: "Science & Tech", desc: "Physik & Coding" },
                en: { title: "Science & Tech", desc: "Physics & Coding" },
                subs: [
                    { 
                        de: "Physik & Science", en: "Physics & Science",
                        items: [
                            { t: "Khan Academy Physics", d: { de: "Mittelstufe Physik", en: "Middle School Physics" }, l: "https://khanacademy.org/science/ms-physics", b: "Science" },
                            { t: "TED-Ed Science", d: { de: "Naturwissenschaftliche Rätsel", en: "Scientific Riddles" }, l: "https://ed.ted.com", b: "Video" }
                        ]
                    },
                    { 
                        de: "Informatik", en: "Computer Science",
                        items: [
                            { t: "CS50 Harvard", d: { de: "Einführung in Informatik", en: "Intro to Computer Science" }, l: "https://pll.harvard.edu/course/cs50", b: "Elite" },
                            { t: "Code.org", d: { de: "Programmieren lernen", en: "Learn to Code" }, l: "https://code.org", b: "9-16J" }
                        ]
                    }
                ]
            },
            "05": {
                color: "#8b5cf6", icon: "🎤",
                de: { title: "Storytelling", desc: "Präsentieren" },
                en: { title: "Storytelling", desc: "Public Speaking" },
                subs: [
                    { 
                        de: "Public Speaking", en: "Public Speaking",
                        items: [
                            { t: "TED-Ed Student Talks", d: { de: "Vorträge von Schülern", en: "Talks by students" }, l: "https://ed.ted.com", b: "Speaking" },
                            { t: "Melati Wijsen", d: { de: "Präsentations-Masterclass", en: "Presentation Masterclass" }, l: "https://youthtopia.education", b: "Expert" }
                        ]
                    }
                ]
            },
            "06": {
                color: "#22d3ee", icon: "🎓",
                de: { title: "PEP & Uni", desc: "Mindset & Projekte" },
                en: { title: "PEP & Uni", desc: "Mindset & Projects" },
                subs: [
                    { 
                        de: "Projekt Support", en: "Project Support",
                        items: [
                            { t: "Impact Guide", d: { de: "Deine eigene Idee starten", en: "Start your own idea" }, l: "https://youthtopia.education", b: "PEP" },
                            { t: "Momentum", d: { de: "Dranbleiben & Gewohnheiten", en: "Consistency & Habits" }, l: "https://youthtopia.education", b: "Mindset" }
                        ]
                    },
                    { 
                        de: "Uni-Kataloge (14+)", en: "University Catalogues",
                        items: [
                            { t: "Harvard Online", d: { de: "Freie Kurse der Harvard Uni", en: "Free courses from Harvard" }, l: "https://pll.harvard.edu", b: "Uni" },
                            { t: "MIT OCW", d: { de: "Original MIT Kursmaterial", en: "Original MIT courseware" }, l: "https://ocw.mit.edu", b: "MIT" },
                            { t: "OpenLearn", d: { de: "Zertifikatskurse Open Uni", en: "Open Uni Certificate courses" }, l: "https://open.edu/openlearn", b: "Certificate" }
                        ]
                    }
                ]
            }
        };

        function setLanguage(lang) {
            currentLang = lang;
            document.getElementById('header-subtitle').innerText = uiTexts[lang].subtitle;
            document.getElementById('search-input').placeholder = uiTexts[lang].searchPlaceholder;
            document.getElementById('search-btn').innerText = uiTexts[lang].searchBtn;
            document.getElementById('section-label').innerText = uiTexts[lang].sectionLabel;
            document.getElementById('back-button').innerText = uiTexts[lang].backBtn;
            document.getElementById('btn-de').className = lang === 'de' ? 'px-4 py-2 rounded-full text-xs font-bold border-2 bg-black text-white border-black' : 'px-4 py-2 rounded-full text-xs font-bold border-2 border-gray-200';
            document.getElementById('btn-en').className = lang === 'en' ? 'px-4 py-2 rounded-full text-xs font-bold border-2 bg-black text-white border-black' : 'px-4 py-2 rounded-full text-xs font-bold border-2 border-gray-200';
            renderMainGrid();
        }

        function renderMainGrid() {
            const grid = document.getElementById('category-grid');
            grid.innerHTML = '';
            for (const [id, content] of Object.entries(data)) {
                grid.innerHTML += `
                    <div onclick="showCategory('${id}')" class="category-card p-8 text-white" style="background-color: ${content.color}">
                        <div class="text-4xl mb-6">${id}</div>
                        <h3 class="text-2xl font-black leading-tight">${content[currentLang].title}<br>${content[currentLang].desc}</h3>
                        <p class="text-sm opacity-90 mt-4 font-medium italic underline">${content.icon} Info</p>
                    </div>`;
            }
        }

        function showCategory(id) {
            const cat = data[id];
            document.getElementById('category-title').innerText = `${id} ${cat[currentLang].title}`;
            const container = document.getElementById('sub-categories-container');
            container.innerHTML = '';
            cat.subs.forEach(sub => {
                const subSection = document.createElement('div');
                subSection.className = "mb-12";
                subSection.innerHTML = `<h3 class="text-xs font-black text-gray-400 uppercase tracking-[0.3em] mb-6 border-l-4 border-gray-200 pl-4">${sub[currentLang]}</h3>`;
                const grid = document.createElement('div');
                grid.className = "grid grid-cols-1 md:grid-cols-2 gap-4";
                sub.items.forEach(item => {
                    grid.innerHTML += `
                        <a href="${item.l}" target="_blank" class="tool-card p-6 bg-white group">
                            <div>
                                <div class="flex justify-between items-start mb-3">
                                    <h4 class="font-bold text-xl leading-tight group-hover:text-blue-600 transition-colors">${item.t}</h4>
                                    <span class="badge bg-gray-100 text-gray-500">${item.b}</span>
                                </div>
                                <p class="text-gray-500 text-sm font-medium leading-relaxed">${item.d[currentLang]}</p>
                            </div>
                            <div class="mt-6 flex items-center text-xs font-black text-blue-600 opacity-0 group-hover:opacity-100 transition-all transform translate-x-[-10px] group-hover:translate-x-0">
                                ${currentLang === 'de' ? 'JETZT LERNEN' : 'LEARN NOW'} →
                            </div>
                        </a>`;
                });
                subSection.appendChild(grid);
                container.appendChild(subSection);
            });
            document.getElementById('main-view').classList.add('hidden');
            document.getElementById('search-section').classList.add('hidden');
            document.getElementById('category-view').classList.remove('hidden');
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function goBack() {
            document.getElementById('category-view').classList.add('hidden');
            document.getElementById('main-view').classList.remove('hidden');
            document.getElementById('search-section').classList.remove('hidden');
        }

        setLanguage('de');
    </script>
</body>
</html>
