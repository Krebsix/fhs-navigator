<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FHS Resource Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .category-card { transition: transform 0.2s; cursor: pointer; border-radius: 2rem; }
        .category-card:hover { transform: scale(1.02); }
        .tool-card { transition: all 0.2s; border-radius: 1.25rem; border: 1px solid #e5e7eb; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }
        .tool-card:hover { border-color: #10b981; background-color: #f8fafc; transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .hidden { display: none; }
        .badge { font-size: 0.65rem; padding: 4px 10px; border-radius: 9999px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900">

    <header class="p-6 max-w-6xl mx-auto flex justify-between items-center bg-white rounded-b-3xl shadow-sm mb-8">
        <div>
            <h1 class="text-3xl font-black tracking-tight uppercase text-green-600">Future Human School</h1>
            <p id="header-subtitle" class="text-sm text-gray-500 font-bold mt-1">Resource Hub • Term 4 • 2026</p>
        </div>
        <div class="flex gap-2">
            <button onclick="setLanguage('de')" id="btn-de" class="px-5 py-2 rounded-full text-xs font-bold border-2 transition-all">DE</button>
            <button onclick="setLanguage('en')" id="btn-en" class="px-5 py-2 rounded-full text-xs font-bold border-2 transition-all">EN</button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-6">
        <section class="mb-12">
            <div class="flex gap-3">
                <input type="text" id="search-input" onkeyup="if(event.key === 'Enter') performSearch()" class="flex-1 p-5 rounded-2xl bg-white border border-gray-200 focus:ring-2 focus:ring-green-500 outline-none font-medium text-lg shadow-sm">
                <button onclick="performSearch()" id="search-btn" class="bg-green-600 text-white px-8 rounded-2xl shadow-md font-bold hover:bg-green-700 transition-colors uppercase tracking-widest text-sm">Suchen</button>
            </div>
        </section>

        <section id="main-view">
            <div id="category-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>

        <section id="detail-view" class="hidden">
            <button onclick="goBack()" class="mb-8 flex items-center text-gray-500 font-black hover:text-black transition-colors uppercase text-sm tracking-widest bg-white py-2 px-4 rounded-full shadow-sm border border-gray-200">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"></path></svg>
                <span id="back-text">Zurück</span>
            </button>
            <div class="bg-white p-8 rounded-3xl shadow-sm mb-10 border-l-8" id="view-header-style">
                <h2 id="view-title" class="text-4xl font-black tracking-tight mb-2"></h2>
                <p id="view-desc" class="text-gray-500 font-medium text-lg"></p>
            </div>
            <div id="results-container"></div>
        </section>
    </main>

    <script>
        let currentLang = 'de';
        const data = {
            "01": { color: "#f59e0b", icon: "🧮", de: { title: "Maths & Reading", desc: "Grundlagen & Übung" }, en: { title: "Maths & Reading", desc: "Tools & Practice" },
                subs: [
                    { label: { de: "Mathe - Tools & Spiele", en: "Maths Tools & Games" }, items: [
                        { t: "Seneca Learning", d: { de: "Adaptive Mathe-Wiederholung (11-16 J.).", en: "Adaptive maths revision (11-16)." }, l: "https://senecalearning.com", b: "11-16" },
                        { t: "Khan Academy", d: { de: "Kostenlose Mathe-Kurse für jedes Level.", en: "Free structured maths courses." }, l: "https://www.khanacademy.org/math", b: "All Ages" },
                        { t: "Prodigy Math", d: { de: "Mathe-Lernen als Rollenspiel.", en: "Maths learning as an RPG game." }, l: "https://www.prodigygame.com/", b: "9-14" },
                        { t: "White Rose Maths", d: { de: "Strukturierte Videos und Arbeitsblätter.", en: "Structured schemes and videos." }, l: "https://whiteroseeducation.com", b: "All Ages" }
                    ]},
                    { label: { de: "Lesen & Schreiben", en: "Reading & Writing" }, items: [
                        { t: "Pobble", d: { de: "Tägliche Schreibimpulse.", en: "Daily writing prompts." }, l: "https://www.pobble.com/", b: "9-16" },
                        { t: "CommonLit", d: { de: "Leseverständnis mit Sachtexten.", en: "Literacy and reading comprehension." }, l: "https://www.commonlit.org", b: "10-16" },
                        { t: "The Reading Realm", d: { de: "Ressourcen für kreatives Lesen.", en: "Creative reading resources." }, l: "https://thereadingrealm.co.uk", b: "9-16" }
                    ]}
                ]
            },
            "02": { color: "#10b981", icon: "🌿", de: { title: "Biomimicry & Design", desc: "Natur-Inspiration" }, en: { title: "Biomimicry & Design", desc: "Nature-inspired design" },
                subs: [
                    { label: { de: "Biomimicry", en: "Biomimicry" }, items: [
                        { t: "AskNature.org", d: { de: "Datenbank für biologische Strategien.", en: "Database of biological strategies." }, l: "https://asknature.org", b: "All Ages" },
                        { t: "Spider Silk (TED)", d: { de: "Die Magie der Spinnenseide.", en: "Magnificence of spider silk." }, l: "https://www.ted.com/talks/cheryl_hayashi_the_magnificence_of_spider_silk", b: "TED" }
                    ]},
                    { label: { de: "Design Thinking", en: "Design Thinking" }, items: [
                        { t: "Stanford Process", d: { de: "Der 5-Schritte Design-Prozess.", en: "The 5-step design model." }, l: "https://ed.ted.com/on/o57WihZH", b: "Stanford" },
                        { t: "Pixar in a Box", d: { de: "Storytelling und Design bei Pixar.", en: "Pixar's art of storytelling." }, l: "https://www.khanacademy.org/computing/pixar", b: "Khan/Pixar" }
                    ]}
                ]
            },
            "03": { color: "#14b8a6", icon: "🌍", de: { title: "Sustainability", desc: "Zukunft & Klima" }, en: { title: "Sustainability", desc: "SDGs & Climate" },
                subs: [
                    { label: { de: "SDGs & Klima", en: "SDGs & Climate" }, items: [
                        { t: "Earth School", d: { de: "30 Lektionen für den Planeten.", en: "30 lessons for the planet." }, l: "https://ed.ted.com/earth-school", b: "TED-Ed" },
                        { t: "SDG Crash Course", d: { de: "Einführung in die 17 Ziele.", en: "Intro to the 17 SDGs." }, l: "https://www.youthtopia.education/courses/sustainable-development-goals-crash-course", b: "Youthtopia" }
                    ]},
                    { label: { de: "Bali Lokal", en: "Bali Local" }, items: [
                        { t: "Ocean Plastic Pollution", d: { de: "Plastik-Krise verstehen.", en: "Understanding the plastic crisis." }, l: "https://youthtopia.education/courses/ocean-plastic-pollution", b: "Local" },
                        { t: "Kembali Ke Hutan", d: { de: "Wald-Wiederaufforstung.", en: "Forest reforestation." }, l: "https://youthtopia.education/courses/kembali-ke-hutan", b: "Bali" }
                    ]}
                ]
            },
            "04": { color: "#3b82f6", icon: "⚛️", de: { title: "Physics & Maths", desc: "Physik & Informatik" }, en: { title: "Physics & Maths", desc: "Science & CS" },
                subs: [
                    { label: { de: "Wissenschaft", en: "Science" }, items: [
                        { t: "Middle School Physics", d: { de: "Kräfte und Energie verstehen.", en: "Understand forces and energy." }, l: "https://www.khanacademy.org/science/ms-physics", b: "9-13" },
                        { t: "Harvard CS50", d: { de: "Einführung in die Informatik.", en: "Intro to Computer Science." }, l: "https://pll.harvard.edu/course/cs50-introduction-computer-science", b: "14+" }
                    ]}
                ]
            },
            "05": { color: "#8b5cf6", icon: "🎤", de: { title: "Storytelling", desc: "Präsentieren" }, en: { title: "Storytelling", desc: "Public Speaking" },
                subs: [
                    { label: { de: "Public Speaking", en: "Public Speaking" }, items: [
                        { t: "Public Speaking 101", d: { de: "Deine Idee präsentieren.", en: "Presenting your idea." }, l: "https://ed.ted.com/ted_ed_collections/public-speaking-101", b: "TED-Ed" },
                        { t: "Chris Anderson (TED)", d: { de: "Meisterhaftes Sprechen.", en: "Mastering public speaking." }, l: "https://ed.ted.com/lessons/we-can-help-you-master-public-speaking-chris-anderson", b: "TED" }
                    ]}
                ]
            },
            "06": { color: "#0ea5e9", icon: "🚀", de: { title: "PEP Support", desc: "Projekt-Hilfe" }, en: { title: "PEP Support", desc: "Project Exploration" },
                subs: [
                    { label: { de: "Prozess & Mindset", en: "Process & Mindset" }, items: [
                        { t: "Gaining Momentum", d: { de: "Dranbleiben bei Projekten.", en: "Keeping your project going." }, l: "https://www.youthtopia.education/courses/gaining-momentum-and-how-to-keep-going-with-sophia", b: "PEP" },
                        { t: "Social Shifters", d: { de: "Echten Impact erzeugen.", en: "Creating real impact." }, l: "https://www.youthtopia.education/courses/socialshifters", b: "PEP" }
                    ]},
                    { label: { de: "Uni Kurse & Marine", en: "Uni Courses & Marine" }, items: [
                        { t: "MIT OpenCourseWare", d: { de: "2.500+ Uni-Kurse online.", en: "2,500+ university courses." }, l: "https://ocw.mit.edu", b: "14+" },
                        { t: "Marine Ecology (CTC)", d: { de: "Meeresökologie-Zertifikat.", en: "Marine ecology certificate." }, l: "https://bit.ly/cdsonlinectc", b: "Bali Cert" }
                    ]}
                ]
            }
        };

        function setLanguage(lang) {
            currentLang = lang;
            document.getElementById('search-input').placeholder = lang === 'de' ? "Was möchtest du lernen?" : "Search resources...";
            document.getElementById('search-btn').innerText = lang === 'de' ? "Suchen" : "Search";
            document.getElementById('back-text').innerText = lang === 'de' ? "Zurück zur Übersicht" : "Back to Overview";
            
            const btns = { de: document.getElementById('btn-de'), en: document.getElementById('btn-en') };
            Object.keys(btns).forEach(k => btns[k].className = k === lang ? 'px-5 py-2 rounded-full text-xs font-bold border-2 bg-green-600 text-white border-green-600' : 'px-5 py-2 rounded-full text-xs font-bold border-2 border-gray-200 text-gray-500 hover:border-gray-300');
            
            renderMainGrid();
            goBack();
        }

        function renderMainGrid() {
            const grid = document.getElementById('category-grid');
            grid.innerHTML = '';
            Object.entries(data).forEach(([id, content]) => {
                grid.innerHTML += `
                    <div onclick="showCategory('${id}')" class="category-card p-8 text-white relative overflow-hidden flex flex-col justify-between min-h-[220px]" style="background-color: ${content.color}">
                        <div><div class="text-5xl mb-4 opacity-90">${content.icon}</div>
                        <h3 class="text-2xl font-black leading-tight mb-1">${id} — ${content[currentLang].title}</h3>
                        <p class="text-sm font-medium opacity-90">${content[currentLang].desc}</p></div>
                        <div class="mt-6 flex justify-end"><div class="bg-white/20 rounded-full p-2"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"></path></svg></div></div>
                    </div>`;
            });
        }

        function showCategory(id) {
            const cat = data[id];
            displayResults(cat[currentLang].title, cat[currentLang].desc, cat.color, cat.subs);
        }

        function performSearch() {
            const q = document.getElementById('search-input').value.toLowerCase();
            if (!q) return;
            let results = [];
            Object.values(data).forEach(cat => {
                cat.subs.forEach(sub => {
                    const found = sub.items.filter(i => i.t.toLowerCase().includes(q) || i.d[currentLang].toLowerCase().includes(q));
                    if (found.length > 0) {
                        results.push({ label: sub.label, items: found });
                    }
                });
            });
            displayResults(currentLang === 'de' ? "Suche" : "Search", `"${q}"`, "#10b981", results);
        }

        function displayResults(title, desc, color, sections) {
            document.getElementById('view-header-style').style.borderColor = color;
            document.getElementById('view-title').innerText = title;
            document.getElementById('view-desc').innerText = desc;
            const container = document.getElementById('results-container');
            container.innerHTML = '';

            sections.forEach(sec => {
                const subSection = document.createElement('div');
                subSection.className = "mb-12";
                
                // Unterkategorie Header
                subSection.innerHTML = `
                    <div class="flex items-center mb-6">
                        <h3 class="pr-4 text-sm font-black text-gray-500 uppercase tracking-widest">
                            ${sec.label[currentLang]}
                        </h3>
                        <div class="h-px bg-gray-200 flex-1"></div>
                    </div>`;
                
                const grid = document.createElement('div');
                grid.className = "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5";
                
                sec.items.forEach(item => {
                    grid.innerHTML += `
                        <a href="${item.l}" target="_blank" class="tool-card p-6 bg-white relative overflow-hidden">
                            <div class="absolute top-0 left-0 w-1.5 h-full" style="background-color: ${color}"></div>
                            <div>
                                <span class="badge mb-3 inline-block" style="background-color: ${color}15; color: ${color}">${item.b}</span>
                                <h4 class="font-bold text-lg leading-tight">${item.t}</h4>
                                <p class="text-gray-500 text-sm mt-2">${item.d[currentLang]}</p>
                            </div>
                            <div class="mt-6 text-xs font-black text-gray-400 uppercase flex items-center group-hover:text-green-600 transition-colors">
                                Link öffnen <span class="ml-2">→</span>
                            </div>
                        </a>`;
                });
                
                subSection.appendChild(grid);
                container.appendChild(subSection);
            });

            document.getElementById('main-view').classList.add('hidden');
            document.getElementById('detail-view').classList.remove('hidden');
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function goBack() {
            document.getElementById('detail-view').classList.add('hidden');
            document.getElementById('main-view').classList.remove('hidden');
        }

        setLanguage('de');
    </script>
</body>
</html>
