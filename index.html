      </div>
    </div>
    <div id="cat-sections"></div>
  </div>

</main>

<!-- FOOTER -->

let lang = 'en';
let currentCatId = null;

const L = (obj) => obj[lang] || obj['en'];

function allTools() {
  return CATS.flatMap(cat =>
    cat.sections.flatMap(sec =>
      sec.tools.map(t => ({ ...t, cat }))
    )
  );
}

// ═══════════════════════════════════════════════════════════════
// RENDER HELPERS
// ═══════════════════════════════════════════════════════════════
function accentOf(cat) {
  return cat.accent || '#6366F1';
}

function buildCard(tool, cat, highlightQ) {
  const a = accentOf(cat);
  const name = highlightQ ? hl(L(tool).name, highlightQ) : L(tool).name;
  const desc = highlightQ ? hl(L(tool).desc, highlightQ) : L(tool).desc;
  const openLabel = lang === 'de' ? 'Link öffnen →' : 'Open link →';
  const localBadge = tool.local
    ? `<span class="inline-block px-2 py-0.5 rounded-full bg-green-100 text-green-700 text-[10px] font-bold">🌴 BALI LOCAL</span>`
    : '';
  const paidBadge = tool.paid
    ? `<span class="inline-block px-2 py-0.5 rounded-full bg-amber-100 text-amber-700 text-[10px] font-bold">💳 PAID</span>`
    : '';
  const secondBtn = (tool.urlB && tool.labelB)
    ? `<a href="${tool.urlB}" target="_blank" rel="noopener noreferrer"
         class="flex-shrink-0 text-xs font-bold py-2 px-3 rounded-xl border border-gray-200 text-gray-600 hover:bg-gray-50 transition-colors whitespace-nowrap">
         ${tool.labelB}
       </a>`
    : '';

  return `
    <div class="tool-card bg-white rounded-2xl p-4 shadow-sm border border-gray-100 flex flex-col gap-3"
         style="border-left:4px solid ${a}">
      <div class="flex items-start justify-between gap-2">
        <div class="flex items-center gap-2 min-w-0">
          <span class="text-2xl leading-none flex-shrink-0">${tool.icon}</span>
          <div class="min-w-0">
            <div class="font-bold text-gray-900 text-sm leading-snug">${name}</div>
            <div class="text-xs text-gray-400 mt-0.5 truncate">${tool.src}</div>
          </div>
        </div>
        <div class="flex flex-col items-end gap-1 flex-shrink-0">
          <span class="inline-block px-2 py-0.5 rounded-full text-white text-[10px] font-bold whitespace-nowrap"
                style="background:${a}">${tool.badge}</span>
          ${localBadge}
          ${paidBadge}
        </div>
      </div>
      <p class="text-gray-600 text-xs leading-relaxed">${desc}</p>
      <div class="flex gap-2 mt-auto flex-wrap">
        <a href="${tool.url}" target="_blank" rel="noopener noreferrer"
           class="flex-1 text-center text-xs font-bold py-2 px-3 rounded-xl text-white hover:opacity-90 transition-opacity whitespace-nowrap"
           style="background:${a}">${openLabel}</a>
        ${secondBtn}
      </div>
    </div>`;
}

function hl(text, q) {
  if (!q) return text;
  const re = new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi');
  return text.replace(re, m => `<mark>${m}</mark>`);
}

function buildCategoryGrid() {
  const el = document.getElementById('category-grid');
  el.innerHTML = CATS.map(cat => {
    const total = cat.sections.flatMap(s => s.tools).length;
    const resWord = lang === 'de' ? 'Ressourcen' : 'resources';
    return `
      <button onclick="showCategory('${cat.id}')"
        class="cat-card text-left rounded-3xl p-5 shadow-md hover:shadow-xl cursor-pointer text-white relative overflow-hidden group border-0"
        style="background:${cat.gradient}; min-height:130px">
        <div class="absolute -right-4 -bottom-4 text-6xl opacity-20 group-hover:opacity-30 transition-opacity select-none">${cat.icon}</div>
        <div class="text-3xl mb-3 leading-none">${cat.icon}</div>
        <div class="font-display font-bold text-base leading-tight mb-1">${L(cat).title}</div>
        <div class="text-white/70 text-xs leading-snug line-clamp-2">${L(cat).subtitle.split('—')[0].trim()}</div>
        <div class="mt-2 text-white/50 text-xs font-bold">${total} ${resWord} →</div>
      </button>`;
  }).join('');
}

function showHome() {
  currentCatId = null;
  document.getElementById('view-home').classList.remove('hidden');
  document.getElementById('view-category').classList.add('hidden');
  document.getElementById('search-results').classList.add('hidden');
  const si = document.getElementById('search-input');
  if (si) si.value = '';
  buildCategoryGrid();
  updateStaticText();
  window.scrollTo({top:0, behavior:'smooth'});
}

function showCategory(catId) {
  const cat = CATS.find(c => c.id === catId);
  if (!cat) return;
  currentCatId = catId;

  document.getElementById('view-home').classList.add('hidden');
  document.getElementById('view-category').classList.remove('hidden');

  const total = cat.sections.flatMap(s => s.tools).length;
  document.getElementById('cat-header').style.background = cat.gradient;
  document.getElementById('cat-icon').textContent     = cat.icon;
  document.getElementById('cat-title').textContent    = L(cat).title;
  document.getElementById('cat-subtitle').textContent = L(cat).subtitle;
  document.getElementById('cat-count').textContent    =
    `${total} ${lang === 'de' ? 'Ressourcen verfügbar' : 'resources available'}`;

  const a = accentOf(cat);
  document.getElementById('cat-sections').innerHTML = cat.sections.map(sec => `
    <div class="mb-8">
      <h3 class="sec-title font-display font-bold text-sm mb-4" style="color:${a}">${L(sec)}</h3>
      <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-3">
        ${sec.tools.map(t => buildCard(t, cat, null)).join('')}
      </div>
    </div>`).join('');

  updateStaticText();
  window.scrollTo({top:0, behavior:'smooth'});
}

// ═══════════════════════════════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════════════════════════════
function handleSearch(raw) {
  const q   = raw.trim().toLowerCase();
  const res = document.getElementById('search-results');
  const lst = document.getElementById('search-list');
  const tit = document.getElementById('search-title');

  if (!q) { res.classList.add('hidden'); lst.innerHTML = ''; return; }

  const hits = allTools().filter(t => {
    const n = L(t).name.toLowerCase();
    const d = L(t).desc.toLowerCase();
    const s = (t.src || '').toLowerCase();
    return n.includes(q) || d.includes(q) || s.includes(q);
  });

  tit.textContent = `${hits.length} ${lang === 'de' ? 'Ergebnisse für' : 'results for'} "${raw}"`;

  lst.innerHTML = hits.length
    ? hits.map(t => buildCard(t, t.cat, q)).join('')
    : `<div class="col-span-3 text-center text-gray-400 py-12 text-sm">
         ${lang === 'de' ? 'Keine Ergebnisse gefunden.' : 'No results found.'}
       </div>`;

  res.classList.remove('hidden');
}

// ═══════════════════════════════════════════════════════════════
// LANGUAGE
// ═══════════════════════════════════════════════════════════════
function toggleLang() {
  lang = lang === 'en' ? 'de' : 'en';
  document.getElementById('lang-toggle').textContent = lang === 'en' ? 'DE' : 'EN';
  document.documentElement.lang = lang;
  updateStaticText();
  if (currentCatId) showCategory(currentCatId);
  else buildCategoryGrid();
}

function updateStaticText() {
  const de = lang === 'de';
  const ht = document.getElementById('home-title');
  const hs = document.getElementById('home-sub');
  const bl = document.getElementById('back-label');
  if (ht) ht.textContent = de ? 'Was willst du lernen?' : 'What do you want to learn?';
  if (hs) hs.textContent = de
    ? 'Wähle eine Kategorie — alle Ressourcen sind kostenlos und öffnen sich im Browser.'
    : 'Pick a category — all resources are free and open in your browser.';
  if (bl) bl.textContent = de ? 'Alle Kategorien' : 'All categories';
  document.querySelectorAll('input[type="search"]').forEach(el => {
    el.placeholder = de ? 'Ressourcen suchen…' : 'Search resources…';
  });
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
buildCategoryGrid();
updateStaticText();
</script>
